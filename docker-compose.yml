services:
  db_orders:
    image: postgis/postgis:18-3.6-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${ORDER_DB_PASSWORD:-SuperSecretPassword123!}
      POSTGRES_DB: orders_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - wellness_kit_network

  db_admins:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${ADMIN_DB_PASSWORD:-SuperSecretPassword123!}
      POSTGRES_DB: admins_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata_admins:/var/lib/postgresql/data
    networks:
      - wellness_kit_network

  backend:
    build:
      context: ./Backend
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__OrdersConnection=Host=db_orders;Port=5432;Database=orders_db;Username=postgres;Password=${ORDER_DB_PASSWORD:-SuperSecretPassword123!}
      - ConnectionStrings__AdminsConnection=Host=db_admins;Port=5432;Database=admins_db;Username=postgres;Password=${ADMIN_DB_PASSWORD:-SuperSecretPassword123!}
    depends_on:
      - db_orders
      - db_admins
    networks:
      - wellness_kit_network

  frontend:
    build:
      context: ./Frontend
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:5000}
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - wellness_kit_network

volumes:
  pgdata:
  pgdata_admins:

networks:
  wellness_kit_network:
    driver: bridge